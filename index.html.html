function parseGPX(txt){
  try{
    const xml=new DOMParser().parseFromString(txt,"text/xml");
    let pts=[...xml.querySelectorAll("trkpt")];
    if(!pts.length)pts=[...xml.querySelectorAll("rtept")];
    if(!pts.length)return null;
    const cs=pts.map(p=>({lat:+p.getAttribute("lat"),lon:+p.getAttribute("lon"),ele:+(p.querySelector("ele")?.textContent||0),t:p.querySelector("time")?.textContent}));
    const hav=(a,b,c,d)=>{const R=6371000,dL=(c-a)*Math.PI/180,dO=(d-b)*Math.PI/180,e=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dO/2)**2;return 2*R*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));};
    let dist=0,dp=0;
    for(let i=1;i<cs.length;i++){dist+=hav(cs[i-1].lat,cs[i-1].lon,cs[i].lat,cs[i].lon);const d=cs[i].ele-cs[i-1].ele;if(d>0)dp+=d;}
    let dur=null;
    if(cs[0].t&&cs[cs.length-1].t)dur=Math.round((new Date(cs[cs.length-1].t)-new Date(cs[0].t))/60000);
    const km=(dist/1000).toFixed(2);
    let pace=null;
    if(dur&&dist>0){const p=dur/(dist/1000);pace=`${Math.floor(p)}:${String(Math.round((p%1)*60)).padStart(2,"0")}`;}
    return{distance:km,dplus:Math.round(dp),duration:dur,pace};
  }catch{return null;}
}

// localStorage-based storage (works on GitHub Pages)
function useStorage(key,fallback){
  const[val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):fallback;}catch{return fallback;}
  });
  const save=useCallback(v=>{
    const n=typeof v==="function"?v(val):v;
    setVal(n);
    try{localStorage.setItem(key,JSON.stringify(n));}catch{}
  },[key,val]);
  return[val,save,true];
}

function calcStreak(logs){
  if(!logs.length)return 0;
  const dates=[...new Set(logs.map(l=>l.date))].sort((a,b)=>b.localeCompare(a));
  let streak=0,cur=dKey(today());
  for(const d of dates){if(d===cur){streak++;cur=dKey(addDays(new Date(cur),-1));}else break;}
  return streak;
}

function ImportModal({onSave,onClose}){
  const[json,setJson]=useState(""),sd_=dKey(today());
  const[sd,setSd]=useState(sd_);
  const[err,setErr]=useState("");
  const handle=()=>{try{const p=JSON.parse(json);if(!p.name||!p.weeks){setErr("Mancano 'name' o 'weeks'");return;}onSave({...p,startDate:p.startDate||sd});}catch(e){setErr("JSON non valido: "+e.message);}};
  return(
    <Modal onClose={onClose} title="Importa Programma JSON">
      <FInp type="date" value={sd} onChange={e=>setSd(e.target.value)} label="Data inizio"/>
      <div style={{marginBottom:10}}>
        <FLabel>JSON del programma</FLabel>
        <textarea value={json} onChange={e=>{setJson(e.target.value);setErr("");}} placeholder='{"name":"Blocco Estate","target":"Gara 7km","startDate":"2026-06-23","weeks":[...]}'
          rows={10} style={{width:"100%",background:C.s2,border:`1px solid ${err?C.red:C.border}`,color:C.text,padding:"10px 12px",fontFamily:"monospace",fontSize:11,outline:"none",resize:"vertical",borderRadius:10}}/>
        {err&&<div style={{color:C.red,fontSize:11,fontFamily:"'Barlow',sans-serif",marginTop:4}}>{err}</div>}
      </div>
      <button onClick={handle} style={{width:"100%",background:grad.orange,border:"none",color:"#fff",padding:"14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,cursor:"pointer",borderRadius:12}}>IMPORTA</button>

  );
}

function App(){
  const[tab,setTab]=useState("home");
  const[logs,setLogs]=useStorage("tlog5-logs",[]);
  const[programs,setPrograms]=useStorage("tlog5-programs",[]);
  const[esercizi,setEsercizi]=useStorage("tlog5-esercizi",ESD);
  const[wellness,setWellness]=useStorage("tlog5-wellness",[]);
  const[modal,setModal]=useState(null);
  const open=(type,data={})=>setModal({type,data});
  const close=()=>setModal(null);
  const saveLog=l=>{setLogs(p=>l.id?p.map(x=>x.id===l.id?l:x):[...p,{...l,id:uid()}]);close();};
  const delLog=id=>{setLogs(p=>p.filter(l=>l.id!==id));close();};
  const saveProg=p=>{setPrograms(p2=>p2.find(x=>x.id===p.id)?p2.map(x=>x.id===p.id?p:x):[...p2,{...p,id:p.id||uid()}]);close();};
  const delProg=id=>setPrograms(p=>p.filter(x=>x.id!==id));
  const addEs=e=>setEsercizi(p=>[...p,{...e,id:uid()}]);
  const getProgSess=useCallback(dateKey=>{
    for(const prog of programs){
      if(!prog.startDate)continue;
      const s=new Date(prog.startDate);
      for(let wi=0;wi<(prog.weeks||[]).length;wi++){
        for(const sess of(prog.weeks[wi].sessions||[])){
          if(dKey(addDays(s,wi*7+(sess.dayOffset||0)))===dateKey)return{...sess,_prog:prog.name};
        }
      }
    }
    return null;
  },[programs]);
  const tk=dKey(today());
  const todaySess=getProgSess(tk);
  const todayLogged=logs.filter(l=>l.date===tk);
  const todayWell=wellness.find(w=>w.date===tk);
  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Barlow Condensed',sans-serif",maxWidth:430,margin:"0 auto",position:"relative",paddingBottom:84}}>
      {tab==="home"&&<HomeTab todaySess={todaySess} todayLogged={todayLogged} todayWell={todayWell} logs={logs} wellness={wellness} onWell={w=>setWellness(p=>[...p.filter(x=>x.date!==tk),w?{date:tk,...w,id:uid()}:null].filter(Boolean))} onLog={()=>open("log",{date:tk})} onView={l=>open("view",{log:l})}/>}
      {tab==="cal"&&<CalTab logs={logs} getProgSess={getProgSess} onAdd={date=>open("log",{date})} onView={l=>open("view",{log:l})}/>}
      {tab==="hist"&&<HistTab logs={logs} onView={l=>open("view",{log:l})}/>}
      {tab==="prog"&&<ProgTab logs={logs} wellness={wellness}/>}
      {tab==="progs"&&<ProgsTab programs={programs} onAdd={()=>open("import",{})} onEdit={p=>open("editProg",{program:p})} onDelete={delProg}/>}
      <button onClick={()=>open("log",{date:tk})} style={{position:"fixed",bottom:90,right:"calc(50% - 215px + 16px)",width:54,height:54,borderRadius:999,background:grad.orange,border:"none",color:"#fff",fontSize:26,cursor:"pointer",boxShadow:`0 0 24px #ff620060,0 4px 16px rgba(0,0,0,.5)`,zIndex:90,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:`${C.s1}f0`,backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,padding:"6px 0 max(6px,env(safe-area-inset-bottom))"}}>
        {[["home","🏠","Home"],["cal","📅","Calendario"],["hist","📋","Storico"],["prog","📊","Progressi"],["progs","🗂️","Programmi"]].map(([k,ic,lb])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:"none",border:"none",color:tab===k?C.orange:C.dim,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 0"}}>
            <span style={{fontSize:18,filter:tab===k?`drop-shadow(0 0 6px ${C.orange})`:"none"}}>{ic}</span>
            <span style={{fontSize:9,letterSpacing:.5,fontWeight:700}}>{lb}</span>
          </button>
        ))}
      </nav>
      {modal?.type==="log"&&<LogModal date={modal.data.date} log={modal.data.log} esercizi={esercizi} plannedSess={modal.data.date?getProgSess(modal.data.date):null} onSave={saveLog} onClose={close} onAddEs={addEs}/>}
      {modal?.type==="view"&&<ViewModal log={modal.data.log} onEdit={()=>open("log",{date:modal.data.log.date,log:modal.data.log})} onDelete={()=>delLog(modal.data.log.id)} onClose={close}/>}
      {modal?.type==="import"&&<ImportModal onSave={saveProg} onClose={close}/>}
      {modal?.type==="editProg"&&<EditProgModal program={modal.data.program} onSave={saveProg} onClose={close}/>}
    </div>
  );
}

function HomeTab({todaySess,todayLogged,todayWell,logs,wellness,onWell,onLog,onView}){
  const now=today(),tk=dKey(now);
  const ws=sow(now),wKeys=Array.from({length:7},(_,i)=>dKey(addDays(ws,i)));
  const thisWeek=logs.filter(l=>wKeys.includes(l.date));
  const thisMonth=logs.filter(l=>l.date.startsWith(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`));
  const dp=thisMonth.reduce((s,l)=>s+(Number(l.dplus)||0),0);
  const streak=calcStreak(logs);
  const tc=todaySess?(ST[todaySess.type]||ST.libero):null;
  const done=todayLogged.length>0;

        {recent.length>0&&(<>
          <div style={{fontSize:10,letterSpacing:3,color:C.muted,fontWeight:700,marginBottom:10,marginTop:8}}>RECENTE</div>

        </>)}
      </div>
    </div>
  );
}

function CalTab({logs,getProgSess,onAdd,onView}){
  const[ws,setWs]=useState(sow(today()));
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const tk=dKey(today());
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button onClick={()=>setWs(addDays(ws,-7))} style={navBtnStyle}>‹</button>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:1}}>{days[0].getDate()} {MESI[days[0].getMonth()]} — {days[6].getDate()} {MESI[days[6].getMonth()]}</div>
        <button onClick={()=>setWs(addDays(ws,7))} style={navBtnStyle}>›</button>
      </div>
      {days.map((day,i)=>{
        const key=dKey(day),isT=key===tk;
        const ps=getProgSess(key);

        const done=logged.length>0;
        const tc=ps?(ST[ps.type]||ST.libero):null;
        return(
          <div key={key} style={{background:C.s1,border:`1px solid ${isT?C.orange:done?C.green+"44":C.border}`,borderRadius:14,marginBottom:8,overflow:"hidden"}}>
            {(isT||done||ps)&&<div style={{height:2,background:isT?grad.orange:done?grad.green:tc?.g||"transparent"}}/>}
            <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{textAlign:"center",minWidth:40,flexShrink:0}}>
                <div style={{fontSize:9,color:C.muted,letterSpacing:2,fontFamily:"'Barlow',sans-serif"}}>{GIORNI[i]}</div>
                <div style={{fontSize:24,fontWeight:900,color:isT?C.orange:C.text,lineHeight:1}}>{day.getDate()}</div>
              </div>
              <div style={{flex:1}}>
                {!ps&&!done&&<div style={{fontSize:11,color:C.dim,fontFamily:"'Barlow',sans-serif"}}>Giorno libero</div>}
                {ps&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:done?4:0}}><span style={{fontSize:14}}>{tc.icon}</span><span style={{fontSize:12,color:done?C.green:tc.color,fontWeight:700,fontFamily:"'Barlow',sans-serif",flex:1}}>{ps.label}</span>{done&&<span style={{fontSize:10,color:C.green}}>✓</span>}</div>}
                {logged.map((l,li)=>{const tc2=ST[l.type]||ST.libero;return(<div key={li} onClick={()=>onView(l)} style={{display:"flex",alignItems:"center",gap:6,marginTop:li>0?3:0,cursor:"pointer"}}><span style={{fontSize:13}}>{tc2.icon}</span><span style={{fontSize:11,color:C.green,fontWeight:700,fontFamily:"'Barlow',sans-serif",flex:1}}>{l.label||tc2.label}</span>{l.rpe&&<span style={{fontSize:9,color:C.orange,fontFamily:"'Barlow',sans-serif"}}>RPE {l.rpe}</span>}</div>);})}
              </div>
              <button onClick={()=>onAdd(key)} style={{background:C.s2,border:`1px solid ${C.border}`,color:C.muted,padding:"6px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:8,flexShrink:0}}>+</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

                <div style={{fontSize:9,color:C.muted,letterSpacing:1,fontFamily:"'Barlow',sans-serif",marginBottom:2}}>{GIORNI[(d.getDay()+6)%7]} {d.getDate()} {MESI[d.getMonth()]} {d.getFullYear()}</div>

function ProgTab({logs,wellness}){
  const[cat,setCat]=useState("corsa");
  const[selEx,setSelEx]=useState(null);
  const tt={contentStyle:{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,fontFamily:"'Barlow',sans-serif",fontSize:11,color:C.text},labelStyle:{color:C.muted}};
  const corsaD=useMemo(()=>logs.filter(l=>l.type==="corsa").sort((a,b)=>a.date.localeCompare(b.date)).map(l=>({d:l.date.slice(5),km:l.distance?+l.distance:null,rpe:l.rpe?+l.rpe:null})),[logs]);
  const salitaD=useMemo(()=>logs.filter(l=>l.type==="salita"&&l.dplus).sort((a,b)=>a.date.localeCompare(b.date)).map(l=>({d:l.date.slice(5),dplus:+l.dplus})),[logs]);
  const palestD=useMemo(()=>{const m={};logs.filter(l=>(l.type==="upper"||l.type==="lower")&&l.exercises?.length).forEach(l=>{l.exercises.forEach(ex=>{(ex.serie||[]).forEach(s=>{if(s.kg){if(!m[ex.nome])m[ex.nome]=[];m[ex.nome].push({d:l.date.slice(5),kg:+s.kg,_d:l.date});}});});});Object.keys(m).forEach(k=>m[k].sort((a,b)=>a._d.localeCompare(b._d)));return m;},[logs]);
  const wellD=useMemo(()=>wellness.filter(w=>w.val).sort((a,b)=>a.date.localeCompare(b.date)).map(w=>({d:w.date.slice(5),val:w.val})),[wellness]);
  const sympD=useMemo(()=>{const m={};logs.filter(l=>l.symptoms?.length).forEach(l=>{l.symptoms.forEach(s=>{if(!m[s])m[s]=0;m[s]++;});});return Object.entries(m).map(([id,count])=>({id,label:SYMS.find(x=>x.id===id)?.label||id,icon:SYMS.find(x=>x.id===id)?.icon||"",count})).sort((a,b)=>b.count-a.count);},[logs]);
  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["corsa","🏃",C.blue],["palestra","🏋️",C.orange],["salita","⛰️",C.purple],["benessere","❤️",C.red]].map(([k,ic,c])=>(
          <button key={k} onClick={()=>{setCat(k);setSelEx(null);}} style={{flex:1,padding:"8px 4px",border:`1px solid ${cat===k?c:C.border}`,background:cat===k?c+"22":C.s1,color:cat===k?c:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span>{ic}</span><span>{k.charAt(0).toUpperCase()+k.slice(1)}</span>
          </button>
        ))}
      </div>
      {cat==="corsa"&&(<>
        <ChartCard title="DISTANZA KM" color={C.cyan}>{corsaD.filter(d=>d.km).length<2?<NoData/>:(
          <ResponsiveContainer width="100%" height={150}><AreaChart data={corsaD.filter(d=>d.km)}><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.cyan} stopOpacity={0.3}/><stop offset="95%" stopColor={C.cyan} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke={C.borderFaint}/><XAxis dataKey="d" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}}/><Tooltip {...tt}/><Area type="monotone" dataKey="km" stroke={C.cyan} strokeWidth={2} fill="url(#cg)" name="km"/></AreaChart></ResponsiveContainer>
        )}</ChartCard>
        <ChartCard title="RPE NEL TEMPO" color={C.orange}>{corsaD.filter(d=>d.rpe).length<2?<NoData/>:(
          <ResponsiveContainer width="100%" height={130}><LineChart data={corsaD.filter(d=>d.rpe)}><CartesianGrid strokeDasharray="3 3" stroke={C.borderFaint}/><XAxis dataKey="d" tick={{fill:C.dim,fontSize:9}}/><YAxis domain={[1,10]} tick={{fill:C.dim,fontSize:9}}/><Tooltip {...tt}/><Line type="monotone" dataKey="rpe" stroke={C.orange} strokeWidth={2.5} dot={{fill:C.orange,r:3}} name="RPE"/></LineChart></ResponsiveContainer>
        )}</ChartCard>
      </>)}
      {cat==="palestra"&&(<>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{Object.keys(palestD).map(ex=>(<button key={ex} onClick={()=>setSelEx(ex)} style={{padding:"5px 10px",border:`1px solid ${selEx===ex?C.orange:C.border}`,background:selEx===ex?C.orange+"22":C.s1,color:selEx===ex?C.orange:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:8}}>{ex}</button>))}{!Object.keys(palestD).length&&<NoData/>}</div>
        {selEx&&palestD[selEx]&&<ChartCard title={`${selEx.toUpperCase()} — PESO (KG)`} color={C.orange}><ResponsiveContainer width="100%" height={150}><AreaChart data={palestD[selEx]}><defs><linearGradient id="og" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.orange} stopOpacity={0.3}/><stop offset="95%" stopColor={C.orange} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke={C.borderFaint}/><XAxis dataKey="d" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}}/><Tooltip {...tt}/><Area type="monotone" dataKey="kg" stroke={C.orange} strokeWidth={2.5} fill="url(#og)" name="kg" dot={{fill:C.orange,r:4}}/></AreaChart></ResponsiveContainer></ChartCard>}
      </>)}
      {cat==="salita"&&<ChartCard title="D+ PER SESSIONE (M)" color={C.purple}>{salitaD.length<2?<NoData/>:<ResponsiveContainer width="100%" height={150}><BarChart data={salitaD}><CartesianGrid strokeDasharray="3 3" stroke={C.borderFaint}/><XAxis dataKey="d" tick={{fill:C.dim,fontSize:9}}/><YAxis tick={{fill:C.dim,fontSize:9}}/><Tooltip {...tt}/><Bar dataKey="dplus" fill={C.purple} radius={[4,4,0,0]} name="D+(m)"/></BarChart></ResponsiveContainer>}</ChartCard>}
      {cat==="benessere"&&(<>
        <ChartCard title="ENERGIA MATTUTINA (1-5)" color={C.green}>{wellD.length<2?<NoData/>:<ResponsiveContainer width="100%" height={150}><AreaChart data={wellD}><defs><linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.green} stopOpacity={0.3}/><stop offset="95%" stopColor={C.green} stopOpacity={0}/></linearGradient></defs><CartesianGrid strokeDasharray="3 3" stroke={C.borderFaint}/><XAxis dataKey="d" tick={{fill:C.dim,fontSize:9}}/><YAxis domain={[1,5]} tick={{fill:C.dim,fontSize:9}}/><Tooltip {...tt}/><Area type="monotone" dataKey="val" stroke={C.green} strokeWidth={2.5} fill="url(#gg)" name="Energia"/></AreaChart></ResponsiveContainer>}</ChartCard>
        {sympD.length>0&&<ChartCard title="SINTOMI FISICI" color={C.red}><div style={{display:"flex",flexDirection:"column",gap:8}}>{sympD.map(s=>(<div key={s.id} style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:16,width:24,textAlign:"center"}}>{s.icon}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,fontFamily:"'Barlow',sans-serif"}}>{s.label}</span><span style={{fontSize:11,color:C.orange,fontWeight:700}}>{s.count}×</span></div><div style={{height:4,background:C.s3,borderRadius:2}}><div style={{height:"100%",background:s.id==="ok"?C.green:C.red,borderRadius:2,width:`${Math.min(100,(s.count/Math.max(...sympD.map(x=>x.count)))*100)}%`}}/></div></div></div>))}</div></ChartCard>}
      </>)}
      <NoteProgressi cat={cat}/>
    </div>
  );
}

        <button onClick={onAdd} style={{background:grad.orange,border:"none",color:"#fff",padding:"8px 14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,cursor:"pointer",borderRadius:10,letterSpacing:1}}>+ IMPORTA JSON</button>
      </div>
      {!programs.length&&<EmptyState icon="🗂️" msg="Nessun programma. Importa un JSON per popolare il calendario."/>}
      {programs.map(p=>(
        <div key={p.id} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,marginBottom:10,overflow:"hidden"}}>
          <div style={{height:3,background:grad.orange}}/>
          <div style={{padding:"14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:800,marginBottom:2}}>{p.name}</div>
              {p.target&&<div style={{fontSize:11,color:C.muted,fontFamily:"'Barlow',sans-serif",marginBottom:4}}>{p.target}</div>}
              {p.startDate&&<div style={{fontSize:10,color:C.orange,letterSpacing:1,fontWeight:700,marginBottom:2}}>INIZIO: {p.startDate}</div>}
              <div style={{fontSize:10,color:C.dim}}>{p.weeks?.length||0} settimane</div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>onEdit(p)} style={ghostBtn}>EDIT</button>
              <button onClick={()=>{if(window.confirm("Eliminare?"))onDelete(p.id);}} style={{...ghostBtn,borderColor:C.red+"44",color:C.red}}>✕</button>
            </div>
          </div>
        </div>
      ))}
      <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginTop:8}}>
        <div style={{fontSize:9,letterSpacing:2,color:C.dim,fontWeight:700,marginBottom:8}}>FORMATO JSON</div>
        <pre style={{fontSize:10,color:C.muted,fontFamily:"monospace",lineHeight:1.6,overflow:"auto",whiteSpace:"pre-wrap",margin:0}}>{`{"name":"Blocco Estate","target":"Gara 7km","startDate":"2026-06-23","weeks":[{"weekNum":1,"sessions":[{"dayOffset":0,"type":"lower","label":"Lower Body","duration":60,"blocks":[{"title":"Main Work","items":["Squat Bulgaro 3×8"]}]}]}]}`}</pre>
      </div>
    </div>
  );
}

function LogModal({date,log,esercizi,plannedSess,onSave,onClose,onAddEs}){
  const fileRef=useRef();
  const[gpxOk,setGpxOk]=useState(false);
  const tc0=plannedSess?(ST[plannedSess.type]||ST.libero):null;
  const[form,setForm]=useState(log||{date,type:plannedSess?.type||"corsa",label:plannedSess?.label||"",duration:plannedSess?.duration||"",distance:"",dplus:"",avgHR:"",rpe:"",pace:"",notes:"",exercises:[],symptoms:[]});
  const[showPlan,setShowPlan]=useState(!!plannedSess&&!log);
  const[newEs,setNewEs]=useState({nome:"",cat:"lower"});
  const[addingEs,setAddingEs]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const tc=ST[form.type]||ST.libero;
  const isGym=form.type==="upper"||form.type==="lower";
  const isRun=["corsa","salita","gara"].includes(form.type);
  const handleGPX=e=>{const file=e.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const res=parseGPX(ev.target.result);if(res){setForm(f=>({...f,distance:res.distance||f.distance,dplus:res.dplus||f.dplus,duration:res.duration||f.duration,pace:res.pace||f.pace}));setGpxOk(true);}};r.readAsText(file);};
  const toggleSym=id=>{const s=form.symptoms||[];set("symptoms",s.includes(id)?s.filter(x=>x!==id):[...s,id]);};
  const addEx=es=>{if((form.exercises||[]).find(e=>e.id===es.id))return;set("exercises",[...(form.exercises||[]),{id:es.id,nome:es.nome,hw:es.hw,serie:[{reps:"",kg:""}]}]);};
  const updS=(ei,si,f2,v)=>{const e=[...(form.exercises||[])];e[ei].serie[si][f2]=v;set("exercises",e);};
  const addS=ei=>{const e=[...(form.exercises||[])];e[ei].serie.push({reps:"",kg:""});set("exercises",e);};
  const remS=(ei,si)=>{const e=[...(form.exercises||[])];e[ei].serie.splice(si,1);set("exercises",e);};
  const remEx=ei=>{const e=[...(form.exercises||[])];e.splice(ei,1);set("exercises",e);};
  return(
    <Modal onClose={onClose} title={log?"Modifica Sessione":"Registra Allenamento"}>
      {plannedSess&&!log&&(
        <div style={{background:tc0.color+"18",border:`1px solid ${tc0.color}44`,borderRadius:10,padding:"10px 12px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:9,color:tc0.color,letterSpacing:2,fontWeight:700}}>📋 PIANO DI OGGI — {tc0.label.toUpperCase()}</div>
            <button onClick={()=>setShowPlan(p=>!p)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:11}}>{showPlan?"▲":"▼"}</button>
          </div>
          {showPlan&&(plannedSess.blocks||[]).slice(0,2).map((b,i)=>(<div key={i} style={{marginTop:6}}><div style={{fontSize:9,color:tc0.color,letterSpacing:1,fontWeight:700,marginBottom:3}}>{b.title||b.t}</div>{(b.items||b.i||[]).slice(0,4).map((item,j)=>(<div key={j} style={{fontSize:11,color:C.muted,fontFamily:"'Barlow',sans-serif",lineHeight:1.7}}>▸ {item}</div>))}</div>))}
        </div>
      )}
      <FInp type="date" value={form.date||""} onChange={e=>set("date",e.target.value)} label="Data"/>
      <div style={{marginBottom:14}}>
        <FLabel>Tipo</FLabel>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(ST).map(([k,v])=>(<button key={k} onClick={()=>set("type",k)} style={{padding:"6px 10px",border:`1px solid ${form.type===k?v.color:C.border}`,background:form.type===k?v.color+"22":C.s2,color:form.type===k?v.color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:8}}>{v.icon} {v.label}</button>))}
        </div>
      </div>
      <FInp value={form.label||""} onChange={e=>set("label",e.target.value)} placeholder="Titolo sessione" label="Titolo"/>
      {isRun&&(
        <div style={{marginBottom:14}}>
          <FLabel>Importa GPX (auto-compila)</FLabel>
          <button onClick={()=>fileRef.current?.click()} style={{width:"100%",background:gpxOk?C.green+"22":C.s2,border:`1px solid ${gpxOk?C.green:C.border}`,color:gpxOk?C.green:C.cyan,padding:"10px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,cursor:"pointer",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span>{gpxOk?"✓ GPX importato — dati compilati":"📍 Carica file .gpx"}</span>
          </button>
          <input ref={fileRef} type="file" accept=".gpx" onChange={handleGPX} style={{display:"none"}}/>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <div><FLabel>Durata (min)</FLabel><FN value={form.duration} onChange={e=>set("duration",e.target.value)} p="45"/></div>
        <div><FLabel>RPE (1-10)</FLabel><FN value={form.rpe} onChange={e=>set("rpe",e.target.value)} p="7" min="1" max="10"/></div>
        {isRun&&<><div><FLabel>Distanza (km)</FLabel><FN value={form.distance} onChange={e=>set("distance",e.target.value)} p="9.1" step="0.01"/></div><div><FLabel>D+ (m)</FLabel><FN value={form.dplus} onChange={e=>set("dplus",e.target.value)} p="468"/></div><div><FLabel>Passo (mm:ss)</FLabel><FN value={form.pace} onChange={e=>set("pace",e.target.value)} p="5:05" type="text"/></div><div><FLabel>FC Media (bpm)</FLabel><FN value={form.avgHR} onChange={e=>set("avgHR",e.target.value)} p="134"/></div></>}
      </div>
      <div style={{marginBottom:14}}>
        <FLabel>Come ti senti fisicamente?</FLabel>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {SYMS.map(s=>{const sel=(form.symptoms||[]).includes(s.id);return(<button key={s.id} onClick={()=>toggleSym(s.id)} style={{padding:"6px 10px",border:`1px solid ${sel?C.orange:C.border}`,background:sel?C.orange+"22":C.s2,color:sel?C.orange:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:8,display:"flex",alignItems:"center",gap:4}}><span>{s.icon}</span><span>{s.label}</span></button>);})}
        </div>
      </div>
      {isGym&&(
        <div style={{marginBottom:14}}>
          <FLabel>Esercizi</FLabel>
          <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,padding:10,marginBottom:10,maxHeight:140,overflowY:"auto"}}>
            {addingEs?(<div style={{display:"flex",gap:6,marginBottom:8}}><input value={newEs.nome} onChange={e=>setNewEs(p=>({...p,nome:e.target.value}))} placeholder="Nome esercizio" style={{flex:1,background:C.s1,border:`1px solid ${C.border}`,color:C.text,padding:"6px 8px",fontFamily:"'Barlow',sans-serif",fontSize:11,outline:"none",borderRadius:6}}/><select value={newEs.cat} onChange={e=>setNewEs(p=>({...p,cat:e.target.value}))} style={{background:C.s1,border:`1px solid ${C.border}`,color:C.text,padding:"6px",outline:"none",borderRadius:6,fontFamily:"'Barlow',sans-serif",fontSize:11}}><option value="upper">Upper</option><option value="lower">Lower</option><option value="core">Core</option></select><button onClick={()=>{if(newEs.nome.trim()){onAddEs({nome:newEs.nome.trim(),cat:newEs.cat,hw:true});setNewEs({nome:"",cat:"lower"});setAddingEs(false);}}} style={{background:C.green,border:"none",color:"#000",padding:"6px 10px",fontWeight:700,fontSize:11,cursor:"pointer",borderRadius:6}}>✓</button></div>):(<button onClick={()=>setAddingEs(true)} style={{padding:"4px 8px",border:`1px dashed ${C.orange}`,background:"transparent",color:C.orange,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:6,marginBottom:6}}>+ Nuovo esercizio</button>)}
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{(esercizi||[]).filter(e=>e.cat===(form.type==="upper"?"upper":"lower")||e.cat==="core").map(es=>{const sel=(form.exercises||[]).some(e=>e.id===es.id);return(<button key={es.id} onClick={()=>addEx(es)} style={{padding:"4px 9px",border:`1px solid ${sel?C.green:C.border}`,background:sel?C.green+"22":C.s1,color:sel?C.green:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,cursor:"pointer",borderRadius:6}}>{es.nome}</button>);})}</div>
          </div>
          {(form.exercises||[]).map((ex,ei)=>(
            <div key={ex.id||ei} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:8,padding:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:12,fontWeight:800,color:C.orange}}>{ex.nome}</div><button onClick={()=>remEx(ei)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:13}}>✕</button></div>
              {(ex.serie||[]).map((s,si)=>(<div key={si} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}><span style={{fontSize:10,color:C.dim,minWidth:18,fontFamily:"'Barlow',sans-serif"}}>S{si+1}</span>{ex.hw&&<input value={s.kg||""} onChange={e=>updS(ei,si,"kg",e.target.value)} placeholder="kg" type="number" style={smallInp}/>}<input value={s.reps||""} onChange={e=>updS(ei,si,"reps",e.target.value)} placeholder="reps" type="number" style={smallInp}/><button onClick={()=>remS(ei,si)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:14}}>−</button></div>))}
              <button onClick={()=>addS(ei)} style={{background:"none",border:`1px dashed ${C.border}`,color:C.muted,padding:"5px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,cursor:"pointer",width:"100%",borderRadius:6}}>+ SERIE</button>
            </div>
          ))}
        </div>
      )}
      <div style={{marginBottom:16}}>
        <FLabel>Note</FLabel>
        <textarea value={form.notes||""} onChange={e=>set("notes",e.target.value)} placeholder="Come è andata? Sensazioni, meteo, crampi..." rows={3} style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,color:C.text,padding:"9px 12px",fontFamily:"'Barlow',sans-serif",fontSize:12,outline:"none",resize:"none",borderRadius:10}}/>
      </div>
      <button onClick={()=>{const pN=form.pace?(()=>{const[m,s]=form.pace.split(":").map(Number);return m+(s||0)/60;})():null;onSave({...form,paceNum:pN});}} style={{width:"100%",background:grad.orange,border:"none",color:"#fff",padding:"14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,letterSpacing:1,cursor:"pointer",borderRadius:12,boxShadow:`0 4px 14px ${C.orange}40`}}>
        {log?"SALVA MODIFICHE":"SALVA ALLENAMENTO"}
      </button>
    </Modal>
  );
}

function ViewModal({log,onEdit,onDelete,onClose}){
  const tc=ST[log.type]||ST.libero,d=new Date(log.date);
  return(
    <Modal onClose={onClose} title="Dettagli Sessione">
      <div style={{background:C.s2,borderRadius:14,overflow:"hidden",marginBottom:16}}>
        <div style={{height:3,background:tc.g}}/>
        <div style={{padding:"14px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:48,height:48,background:tc.color+"22",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{tc.icon}</div>
          <div><div style={{fontSize:9,color:C.muted,letterSpacing:2,fontFamily:"'Barlow',sans-serif",marginBottom:2}}>{GIORNI[(d.getDay()+6)%7]} {d.getDate()} {MESI[d.getMonth()]} {d.getFullYear()}</div><div style={{fontSize:17,fontWeight:900,lineHeight:1.1}}>{log.label||tc.label}</div><div style={{fontSize:9,color:tc.color,fontWeight:700,letterSpacing:1,marginTop:2}}>{tc.label.toUpperCase()}</div></div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {log.duration&&<Met l="DURATA" v={`${log.duration}min`}/>}
        {log.rpe&&<Met l="RPE" v={`${log.rpe}/10`} c={C.orange}/>}
        {log.distance&&<Met l="DISTANZA" v={`${log.distance}km`} c={C.cyan}/>}
        {log.dplus&&<Met l="D+" v={`${log.dplus}m`} c={C.purple}/>}
        {log.pace&&<Met l="PASSO" v={`${log.pace}/km`} c={C.green}/>}
        {log.avgHR&&<Met l="FC MEDIA" v={`${log.avgHR}bpm`}/>}
      </div>
      {(log.symptoms||[]).length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{log.symptoms.map(s=>{const so=SYMS.find(x=>x.id===s);return so?(<span key={s} style={{padding:"4px 10px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,fontFamily:"'Barlow',sans-serif",display:"flex",alignItems:"center",gap:4}}><span>{so.icon}</span><span style={{color:C.muted}}>{so.label}</span></span>):null;})}</div>}
      {(log.exercises||[]).length>0&&<div style={{marginBottom:14}}><div style={{fontSize:9,letterSpacing:3,color:C.muted,fontWeight:700,marginBottom:8}}>ESERCIZI</div>{log.exercises.map((ex,i)=>(<div key={i} style={{background:C.s2,borderRadius:10,padding:"8px 10px",marginBottom:6}}><div style={{fontSize:11,fontWeight:800,color:C.orange,marginBottom:4}}>{ex.nome}</div>{(ex.serie||[]).map((s,si)=><div key={si} style={{fontSize:11,color:C.muted,fontFamily:"'Barlow',sans-serif"}}>S{si+1}: {ex.hw?`${s.kg||"?"}kg × `:""}{s.reps||"?"} reps</div>)}</div>))}</div>}
      {log.notes&&<div style={{background:C.s2,borderRadius:10,padding:"10px 12px",fontFamily:"'Barlow',sans-serif",fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>{log.notes}</div>}
      <div style={{display:"flex",gap:8}}>
        <button onClick={onEdit} style={{flex:1,background:C.s2,border:`1px solid ${C.border}`,color:C.text,padding:"12px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",borderRadius:12}}>MODIFICA</button>
        <button onClick={()=>{if(window.confirm("Eliminare?"))onDelete();}} style={{background:C.s2,border:`1px solid ${C.red}44`,color:C.red,padding:"12px 16px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",borderRadius:12}}>✕</button>
      </div>
    </Modal>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
